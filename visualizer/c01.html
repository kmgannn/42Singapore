<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C01 Pointers & Dereferencing Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
    
        .code-line {
            display: flex;
            gap: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .code-line-num {
            color: var(--text-muted);
            width: 20px;
            text-align: right;
            user-select: none;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding-right: 8px;
        }
        .code-line-content {
            color: #c084fc;
            white-space: pre;
        }
        .code-line.active-line-highlight {
            background: rgba(139, 92, 246, 0.25);
            border-left: 3px solid var(--accent-primary);
            box-shadow: inset 2px 0 8px rgba(139, 92, 246, 0.15);
        }
        .code-line.active-line-highlight .code-line-content {
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.4);
        }
    

        /* CSS for pointer variables visualization */
        .memory-space {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        .var-blocks-container {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 16px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: var(--radius-md);
            border: 1px dashed rgba(255, 255, 255, 0.05);
            min-height: 120px;
        }
        .var-cell {
            width: 130px;
            height: 85px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            position: relative;
            transition: all 0.3s;
        }
        .var-cell.highlight-write {
            border-color: var(--accent-success);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.05);
        }
        .var-cell.highlight-read {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
            background: rgba(139, 92, 246, 0.05);
        }
        .var-cell-name {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 0;
            font-weight: 600;
            color: var(--accent-warning);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .var-cell-val {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .var-cell-addr {
            text-align: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            padding-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="main-header">
            <div class="logo">
                <a href="index.html" class="back-link">&larr; Dashboard</a>
                <span class="pulse-dot"></span>
                <h1>C01: Pointers & References</h1>
            </div>
            <div class="exercise-selector-container">
                <label for="exercise-select">Active Function:</label>
                <select id="exercise-select">
                    <optgroup label="Basic Pointers">
                        <option value="ft_ft" selected>ft_ft (ex00)</option>
                        <option value="ft_ultimate_ft">ft_ultimate_ft (ex01)</option>
                        <option value="ft_swap">ft_swap (ex02)</option>
                    </optgroup>
                    <optgroup label="Math & Division">
                        <option value="ft_div_mod">ft_div_mod (ex03)</option>
                        <option value="ft_ultimate_div_mod">ft_ultimate_div_mod (ex04)</option>
                    </optgroup>
                    <optgroup label="Strings">
                        <option value="ft_putstr">ft_putstr (ex05)</option>
                        <option value="ft_strlen">ft_strlen (ex06)</option>
                    </optgroup>
                    <optgroup label="Array Manipulation">
                        <option value="ft_rev_int_tab">ft_rev_int_tab (ex07)</option>
                        <option value="ft_sort_int_tab">ft_sort_int_tab (ex08)</option>
                    </optgroup>
                </select>
            </div>
        </header>

        <!-- Main Layout -->
        <main class="grid-layout">
            <!-- Left Panel: Input & Control -->
            <section class="panel glass controls-panel">
                <h2>Parameters & Inputs</h2>
                
                <div class="form-group" id="a-input-group">
                    <label for="a-input">Integer variable `a`:</label>
                    <input type="number" id="a-input" value="42">
                </div>

                <div class="form-group" id="b-input-group">
                    <label for="b-input">Integer variable `b`:</label>
                    <input type="number" id="b-input" value="24">
                </div>

                <div class="form-group" id="array-input-group">
                    <label for="arr-input">Integer Array (comma separated):</label>
                    <input type="text" id="arr-input" value="5, 2, 9, 1, 7">
                    <small>Separate values with commas.</small>
                </div>

                <div class="playback-controls">
                    <button id="btn-reset" title="Reset Simulation">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.5 2v6h6M21.5 22v-6h-6"/><path d="M22 11.5A10 10 0 0 0 7.9 4.3L2.5 8m19.5 8l-5.4 3.7A10 10 0 0 1 2 12.5"/></svg>
                        Reset
                    </button>
                    <button id="btn-prev" title="Step Backward">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button id="btn-play" class="btn-primary" title="Play / Pause">
                        <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        <svg id="pause-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                        <span>Play</span>
                    </button>
                    <button id="btn-next" title="Step Forward">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                </div>

                <div class="form-group speed-slider-container">
                    <label for="speed-slider">Simulation Speed:</label>
                    <div class="slider-wrapper">
                        <span>Slow</span>
                        <input type="range" id="speed-slider" min="100" max="1500" value="600" step="50">
                        <span>Fast</span>
                    </div>
                </div>
            </section>

            <!-- Center Panel: Visualization Stage -->
            <section class="panel glass visualization-panel">
                <div class="stage-header">
                    <h2>Memory Blocks & Pointer Map</h2>
                </div>

                <!-- Simulation Space -->
                <div class="simulation-space" style="display: flex; gap: 24px; flex-wrap: wrap;">
                    <!-- Left Column: C Code -->
                    <div class="code-column" style="flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 10px;">
                        <h3>C Source Code Execution</h3>
                        <div class="code-box-wrapper" id="code-viewer-box" style="background: rgba(10, 15, 26, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--radius-sm); padding: 12px; font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.5; color: #f3f4f6; overflow-y: auto; max-height: 250px;">
                            <!-- Code lines populated by JS -->
                        </div>
                    </div>
                    
                    <!-- Right Column -->
                    <div class="vars-column" style="flex: 1.2; min-width: 320px; display: flex; flex-direction: column; gap: 20px;">
                        <div class="memory-space">
                        <!-- Variables Visualizer -->
                        <div class="buffer-wrapper">
                            <h3 id="vars-title">Stack Memory Pointers</h3>
                            <div class="var-blocks-container" id="variables-container">
                                <!-- JS will inject variables here -->
                            </div>
                        </div>

                        <!-- Array Grid representation (if applicable) -->
                        <div class="buffer-wrapper" id="array-wrapper">
                            <h3>Array Values</h3>
                            <div class="buffer-grid" id="dest-buffer">
                                <!-- Array cells inject -->
                            </div>
                        </div>
                    </div>
                    </div>
                </div>
            </section>

            <!-- Bottom Left Panel: Console Logs -->
            <section class="panel glass console-panel">
                <h2>Execution Trace</h2>
                <div class="console-box" id="console-logs">
                    <div class="log-line system-log">Initializing visualizer environment... Ready.</div>
                </div>
            </section>

            <!-- Bottom Right Panel: Mental Guide -->
            <section class="panel glass guide-panel">
                <h2>Mental Guide & Pitfalls</h2>
                <div class="guide-content" id="guide-content">
                    <!-- Dynamic guides populated by JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="c01.js"></script>
</body>
</html>
